<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agromaguey Pro | Sistema de Gestión</title>
    <link rel="stylesheet" href="Untitled-1.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <span class="icon">🌵</span>
                <h1>Agro<span>Maguey</span></h1>
            </div>
            <div class="user-box">
                <label>Perfil de Acceso</label>
                <select id="rolSelect" onchange="gestionarAcceso()">
                    <option value="empleado">👤 Empleado</option>
                    <option value="supervisor">🔑 Supervisor</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h2 id="header-title">Operaciones de Almacén</h2>
                <p id="header-desc">Registro de entrada y control de producción.</p>
            </header>

            <div class="dashboard-grid">
                <section class="glass-card">
                    <h3>➕ Nuevo Registro</h3>
                    <div class="form-group">
                        <label>Variedad de Agave</label>
                        <select id="tipo-agave">
                            <option value="espadin">Agave Espadín (Rendimiento Alto)</option>
                            <option value="silvestre">Agave Silvestre (Rendimiento Bajo)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Materia Prima (Peso en kg)</label>
                        <input type="number" id="input-kg" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Producción (Botellas Listas)</label>
                        <input type="number" id="input-botellas" placeholder="0">
                    </div>
                    <button class="btn-main" onclick="registrarOperacion()">Guardar Registro</button>
                    <div id="status-msg"></div>
                </section>

                <div id="seccion-admin" class="hidden">
                    <div class="kpi-grid">
                        <div class="kpi-card">
                            <small>Ingresos</small>
                            <span id="ingresos-val" class="txt-green">$0</span>
                        </div>
                        <div class="kpi-card">
                            <small>Gastos (PDF Data)</small>
                            <span id="costos-val" class="txt-red">$0</span>
                        </div>
                        <div class="kpi-card highlight">
                            <small>Balance Neto</small>
                            <span id="balance-val">$0</span>
                        </div>
                    </div>

                    <div class="glass-card chart-section">
                        <h3>📈 Balance Financiero Global</h3>
                        <div class="chart-container">
                            <canvas id="graficaDonut"></canvas>
                        </div>
                    </div>

                    <div class="glass-card table-section">
                        <h3>📋 Historial de Lotes</h3>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Variedad</th>
                                        <th>Peso</th>
                                        <th>Botellas</th>
                                        <th>Margen</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="const data.js"></script>
</body>
</html>
